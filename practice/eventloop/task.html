<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宏任務、微任務</title>
  <link rel="stylesheet" href="../../css/all.css">
</head>

<body>
  <h1>宏任務、微任務</h1>

  <div class="flex-btn-group">
    <button type="button" onclick="test1();">基本測試</button>
    <button type="button" onclick="test2();">嵌套測試</button>
    <button type="button" onclick="test3();">巢狀函式測試</button>
    <button type="button" onclick="test4();">其它測試</button>
    <button type="button" onclick="testAsync();">測試 Async</button>
  </div>


  <script>
    console.log(`腳本 #1`);

    // 基本測試
    function test1 () {
      console.clear();
      console.log('開始');

      setTimeout(() => {
        console.log('宏任務 1');
      }, 0);

      Promise.resolve().then(() => {
        console.log('微任務 1');
      });

      setTimeout(() => {
        console.log('宏任務 2');
      }, 0);

      Promise.resolve().then(() => {
        console.log('微任務 2');
      });

      console.log('結束');
      // 輸出：開始 → 結束 → 微任務 1 → 微任務 2 → 宏任務 1 → 宏任務 2
    }

    // 嵌套測試
    function test2 () {
      console.clear();
      console.log(`開始`);

      setTimeout(() => {
        console.log('[setTimeout #1]');
        Promise.resolve().then(() => {
          console.log('[setTimeout #1] Promise resolve #1');
        });
        Promise.resolve().then(() => {
          console.log('[setTimeout #1] Promise resolve #2');
        });
      }, 0);

      new Promise((resolve) => {
        console.log('[Promise resolve #1]');
        resolve();
      })
        .then(() => {
          console.log('[Promise then #1]');

          setTimeout(() => {
            console.log('[Promise then #1] setTimeout');
          }, 0);

          Promise.resolve().then(() => {
            console.log('[Promise then #1] Promise resolve');
          });
        });

      console.log('結束');
      /**
       * 結果：
       * 開始
       * [Promise resolve #1]
       * 結束
       * [Promise then #1]
       * [Promise then #1] Promise resolve
       * [setTimeout #1]
       * [setTimeout #1] Promise resolve #1
       * [setTimeout #1] Promise resolve #2
       * [Promise then #1] setTimeout
       * 
       * 結論：
       * Call Stack 為空後會先執行所有微任務（包含後來又插入的），
       * 執行完之後會取出一個宏任務放到 Call Stack 裡執行。
       * 重複以上步驟。
       */
    }

    // 巢狀函式測試
    function test3 () {
      console.clear();
      console.log(`巢狀函式開始`);

      setTimeout(() => {
        console.log('Macro #1');
      }, 0);

      function callMacro () {
        setTimeout(() => {
          console.log('Macro #2');
        }, 0);

        function callMicro () {
          Promise.resolve().then(() => {
            console.log('Micro #1');
          });
        }

        callMicro();
      }

      callMacro();
      /**
       * 結果：
       * 巢狀函式開始
       * 巢狀函式結束
       * Micro #1
       * Macro #1
       * Macro #2
       * 
       * 結論：即使是巢狀函式結論也是一樣的。
       **/

      console.log(`巢狀函式結束`);
    }

    // 其它測試
    function test4 () {
      console.clear();
      console.log("begins");  // #1

      setTimeout(() => {
        console.log("[setTimeout 1]");  // #3

        Promise.resolve().then(() => {
          console.log("[setTimeout 1] promise 1");  // #4
        });
      }, 0);

      new Promise(function (resolve, reject) {
        console.log("[promise 2]"); // #2

        setTimeout(function () {
          console.log("[promise 2] setTimeout 2");  // #5
          resolve("resolve 1");
        }, 0);
      })
        .then((res) => {
          console.log("[promise 2] then");  // #6

          setTimeout(() => {
            console.log(`[promise 2] result ==>`, res); // #7
          }, 0);
        });
    }

    /* 測試 Async */
    function testAsync () {
      console.clear();

      async function async1 () {
        console.log("async1 start");  // #2
        await async2();
        console.log("async1 end");  // #6 await 後的程式碼會被包成一個微任務放入 microtask queue 中等待
      }

      async function async2 () {
        console.log("async2");  // #3
      }

      console.log("script start");  // #1

      setTimeout(function () {
        console.log("setTimeout");  // #8
      }, 0);

      async1();

      new Promise(function (resolve) {
        console.log("promise1");  // #4
        resolve();
      })
        .then(function () {
          console.log("promise2");  // #7
        });

      console.log("script end");  // #5
    }

  </script>

  <script>
    console.log(`腳本 #2`);
  </script>
</body>

</html>
